apiVersion: apps/v1
kind: Deployment
metadata:
  name: myapp

spec:
  replicas: 2

  selector:
    matchLabels:
      app: myapp

  template:
    metadata:
      labels:
        app: myapp

    spec:
      containers:
      - name: myapp-container
        image: 048051882772.dkr.ecr.ap-south-1.amazonaws.com/test-image:22
        ports:
        - containerPort: 8080
